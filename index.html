<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Mukhtar</title>
    
    <!-- Link ke Manifest PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a3d31">

    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg-gradient: linear-gradient(135deg, #116a56 0%, #0a3d31 100%);
            --panel-bg: rgba(255, 255, 255, 0.08);
            --panel-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --accent-gold: #e6c683;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Mencegah scroll pada body */
        }

        /* --- MAIN CONTAINER (MOBILE FRAME) --- */
        .app-container {
            background-color: #051a15; /* Warna bingkai HP */
            width: 360px; /* Lebar standar mobile */
            height: 740px; /* Tinggi standar mobile */
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            border: 12px solid #051a15; /* Bingkai fisik HP */
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* --- APP CONTENT --- */
        .app-content {
            flex: 1;
            background: var(--bg-gradient);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-y: auto; /* Scroll konten di dalam HP jika perlu */
        }

        /* Pola Geometris Islami (Overlay) */
        .app-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            opacity: 0.4;
            z-index: 0;
        }

        .app-content > * {
            z-index: 1; /* Memastikan konten di atas pola */
        }

        /* --- LOGO AREA --- */
        .logo-section {
            margin-top: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .icon-islamic {
            font-size: 60px;
            color: var(--accent-gold);
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(230, 198, 131, 0.5));
            /* Jika pakai gambar: 
            width: 80px; height: 80px;
            */
        }

        .app-title {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        /* --- DIGITAL CLOCK --- */
        .clock-section {
            margin-bottom: 30px;
            text-align: center;
        }

        #clock {
            font-size: 54px;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums; /* Angka tidak melompat */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* --- PRAYER TIMES PANEL --- */
        .prayer-panel {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        .prayer-times-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            text-align: center;
        }

        .prayer-item .prayer-name {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .prayer-item .prayer-time {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-gold);
        }

        /* Pembatas hiasan kecil */
        .prayer-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--panel-border), transparent);
            margin: 10px 0;
        }

        /* --- QIBLA COMPASS PANEL --- */
        .qibla-panel {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }

        .compass-visual {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--panel-border);
            position: relative;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--text-secondary);
            font-size: 10px;
        }
        
        /* Mata Angin Kompas */
        .compass-visual::before { content: 'N'; position: absolute; top: 2px; }
        .compass-visual::after { content: 'S'; position: absolute; bottom: 2px; }
        .compass-label-e { position: absolute; right: 2px; }
        .compass-label-w { position: absolute; left: 2px; }

        .compass-arrow {
            position: absolute;
            width: 4px;
            height: 40px;
            background-color: var(--accent-gold);
            border-radius: 2px;
            /* Arahkan panah (contoh: 295 derajat untuk Qibla di Ind) */
            transform: rotate(295deg); 
            transform-origin: center center;
            filter: drop-shadow(0 0 5px var(--accent-gold));
        }
        .compass-arrow::after {
            content: '';
            position: absolute;
            top: -5px; left: -3px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 10px solid var(--accent-gold);
        }

        .qibla-text {
            flex: 1;
        }

        .qibla-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .qibla-direction {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        /* --- STATUS FOOTER --- */
        .status-footer {
            margin-top: auto; /* Tempel di bawah */
            width: 100%;
            text-align: center;
            padding-bottom: 10px;
        }

        .pwa-ready-text {
            font-size: 10px;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
        }

        .status-icon {
            width: 16px;
            height: 16px;
            background-color: #4caf50; /* Hijau Sukses */
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

    </style>
</head>
<body>

    <!-- CONTAINER UTAMA (Frame HP) -->
    <div class="app-container">
        
        <!-- KONTEN APLIKASI DI DALAM HP -->
        <div class="app-content">
            
            <!-- SECTION LOGO -->
            <div class="logo-section">
                <!-- Gunakan simbol teks untuk placeholder -->
                <div class="icon-islamic">&#x262a;</div> 
                <!-- Jika ada gambar, gunakan: <img src="icon-islamic.png" class="icon-islamic" alt="Logo"> -->
                <h1 class="app-title">Al Mukhtar</h1>
            </div>

            <!-- SECTION JAM DIGITAL -->
            <div class="clock-section">
                <div id="clock">00:00:00</div>
            </div>

            <!-- PANEL WAKTU SHOLAT (Data Statis) -->
            <div class="prayer-panel">
                <div class="prayer-times-grid">
                    <div class="prayer-item"><div class="prayer-name">Fajr</div><div class="prayer-time">05:12</div></div>
                    <div class="prayer-item"><div class="prayer-name">Dhuhr</div><div class="prayer-time">12:05</div></div>
                    <div class="prayer-item"><div class="prayer-name">Asr</div><div class="prayer-time">15:30</div></div>
                    <div class="prayer-item"><div class="prayer-name">Maghrib</div><div class="prayer-time">18:02</div></div>
                    <div class="prayer-item"><div class="prayer-name">Isha</div><div class="prayer-time">19:15</div></div>
                </div>
                <div class="prayer-divider"></div>
            </div>

            <!-- PANEL KOMPAS QIBLA (Statis) -->
            <div class="qibla-panel">
                <div class="compass-visual">
                    <span class="compass-label-e">E</span>
                    <span class="compass-label-w">W</span>
                    <div class="compass-arrow"></div>
                </div>
                <div class="qibla-text">
                    <div class="qibla-label">Qibla Direction</div>
                    <div class="qibla-direction">Mecca</div>
                </div>
            </div>

            <!-- SECTION STATUS (Footer) -->
            <div class="status-footer">
                <div class="pwa-ready-text">PWA Ready</div>
                <div class="status-bar">
                    <div class="status-icon"></div>
                    <span>PWA STATUS: SECURE & CONNECTED</span>
                </div>
            </div>

        </div> <!-- End app-content -->

    </div> <!-- End app-container -->

    <script>
        // --- JAVASCRIPT JAM REAL-TIME ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Jalankan setiap detik
        setInterval(updateClock, 1000);
        updateClock(); // Jalankan langsung saat load

        // --- REGISTER SERVICE WORKER (PWA) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.log('SW Registration Failed', err));
            });
        }
    </script>
</body>
</html>
