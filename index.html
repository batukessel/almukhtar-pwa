<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Al Mukhtar</title>
    <link rel="manifest" href="manifest.json"/>
    <meta name="theme-color" content="#0f766e"/>

    <style>
        :root {
            --bg-color: #0f172a;
            --header-color: #0f766e; /* Warna lengkungan */
            --accent-color: #0ea5e9;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Header Melengkung */
        .header-arc {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25vh; /* Tinggi area lengkungan */
            background: var(--header-color);
            /* Membuat lengkungan setengah lingkaran ke bawah */
            border-bottom-left-radius: 50% 100%;
            border-bottom-right-radius: 50% 100%;
            z-index: -1;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        img {
            width: 130px;
            height: 130px;
            border-radius: 30px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        h1 {
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #clock {
            font-size: clamp(60px, 18vw, 90px);
            margin-top: 10px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            background: linear-gradient(to bottom, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #status {
            margin-top: 20px;
            font-size: 0.85rem;
            padding: 6px 18px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }
    </style>
</head>

<body>

    <!-- Elemen Lengkungan -->
    <div class="header-arc"></div>

    <div class="container">
        <img src="icon-512.png" alt="Logo Al Mukhtar"/>
        <h1>Al Mukhtar</h1>
        <div id="clock">00:00:00</div>
        <br>
        <div id="status">PWA Active</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
